name: 🔵 Blue — Deploy Staging (develop branch)

on:
    push:
        branches: [develop]

jobs:
    deploy-staging:
        name: Build & Deploy to Vercel Preview
        runs-on: ubuntu-latest
        outputs:
            preview_url: ${{ steps.deploy.outputs.preview_url }}
        environment:
            name: staging
            url: ${{ steps.deploy.outputs.preview_url }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build (staging)
              env:
                  VITE_APP_ENV: staging
                  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
                  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
                  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
                  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
                  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
                  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
                  VITE_WHATSAPP_NUMBER: ${{ secrets.VITE_WHATSAPP_NUMBER }}
                  VITE_WHATSAPP_DISPLAY: ${{ secrets.VITE_WHATSAPP_DISPLAY }}
                  VITE_UPI_ID: ${{ secrets.VITE_UPI_ID }}
                  VITE_UPI_NUMBER: ${{ secrets.VITE_UPI_NUMBER }}
                  VITE_UPI_DISPLAY: ${{ secrets.VITE_UPI_DISPLAY }}
                  VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}
                  VITE_WA_GROUP_LINK: ${{ secrets.VITE_WA_GROUP_LINK }}
                  VITE_WA_CHANNEL_LINK: ${{ secrets.VITE_WA_CHANNEL_LINK }}
                  VITE_WA_TRACKING_LINK: ${{ secrets.VITE_WA_TRACKING_LINK }}
                  VITE_APP_DOMAIN: ${{ secrets.VITE_APP_DOMAIN }}
              run: npm run build

            - name: Deploy Preview to Vercel
              id: deploy
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
              run: |
                  npm i -g vercel

                  # Wrap the Vite dist into Vercel Build Output API format
                  mkdir -p .vercel/output/static
                  cp -r dist/. .vercel/output/static/

                  # config.json — tells Vercel this is a static site with SPA fallback
                  printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json

                  PREVIEW_URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
                  echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
                  echo "### 🔵 Staging deployed" >> $GITHUB_STEP_SUMMARY
                  echo "**URL:** $PREVIEW_URL" >> $GITHUB_STEP_SUMMARY
                  echo "**Branch:** \`develop\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

    # ── Customer E2E tests — run against the live Vercel preview URL ──────────
    e2e-customer:
        name: 🧪 Customer E2E Tests
        runs-on: ubuntu-latest
        needs: deploy-staging # waits for preview URL to be live
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run customer E2E suite
              env:
                  # Point Playwright at the deployed preview — not localhost
                  BASE_URL: ${{ needs.deploy-staging.outputs.preview_url }}
              run: npx playwright test e2e/customer.spec.ts --project=mobile --reporter=github
              # mobile project only — keeps CI fast; desktop covered by local runs

            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-${{ github.sha }}
                  path: playwright-report/
                  retention-days: 7
